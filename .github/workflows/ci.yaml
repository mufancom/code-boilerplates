name: CI
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
permissions:
  contents: read
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
      - run: npm install
      - run: npm test
      - run: npm --no-git-tag-version version 0.0.0-$GITHUB_SHA
      - run: npm publish --access public --tag latest
